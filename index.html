<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Gastos</title>
manifest.json
styles.css
</head>

<body>

<!-- ==========================
     AUTENTICACIÓN POR PIN
=========================== -->
<div id="authOverlay" class="auth-overlay">
  <div class="pin-container">
    <h2>Introduce tu PIN</h2>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="pin-pad">
      <button onclick="pressPin(1)">1</button>
      <button onclick="pressPin(2)">2</button>
      <button onclick="pressPin(3)">3</button>
      <button onclick="pressPin(4)">4</button>
      <button onclick="pressPin(5)">5</button>
      <button onclick="pressPin(6)">6</button>
      <button onclick="pressPin(7)">7</button>
      <button onclick="pressPin(8)">8</button>
      <button onclick="pressPin(9)">9</button>
      <button onclick="clearPin()">C</button>
      <button onclick="pressPin(0)">0</button>
      <button onclick="biometricAuth()">🔒</button>
    </div>
  </div>
</div>

<!-- ==========================
     CONTENEDOR PRINCIPAL
=========================== -->
<div id="movimientos" data-permiso="NO" class="hidden" data-modo="lista">

  <!-- Barra superior -->
  <div class="topbar">
    <h1>Mis Gastos</h1>
  </div>

  <!-- Filtros -->
  <div class="filtros-wrapper">
    <select id="filtroMes" onchange="resetPagina(); mostrar();"></select>
    <select id="filtroAño" onchange="resetPagina(); mostrar();"></select>
    <select id="filtroCat" onchange="resetPagina(); mostrar();"></select>
    <select id="filtroSub" onchange="resetPagina(); mostrar();"></select>
    <select id="filtroOri" onchange="resetPagina(); mostrar();"></select>
  </div>

  <!-- Lista o gráficos -->
  <div id="lista"></div>

  <!-- Loader -->
  <div id="loader" class="loader">Cargando...</div>

  <!-- Footer -->
  <div class="footer-controles">

      <!-- FILA DE BOTONES INFERIORES -->
      <div class="footer-row">
        <button class="plus"></button>
        <button class="plus"></button>
        <button class="plus"></button>
      </div>

      <!-- BALANCE -->
      <div id="balance" class="balance">0.00 €</div>

      <!-- BOTONES DE CSV Y BACKUP LOCAL -->
      <div class="backup-zone">

        <button class="btn-small silver" onclick="exportarCSV()">Exportar CSV</button>

        <label class="btn-small silver">
          Importar CSV
          <input type="file" accept=".csv" onchange="importarCSV(event)" style="display:none;">
        </label>

      </div>

      <!-- ==========================
           NUEVA ZONA DROPBOX
      =========================== -->
      <div class="zona-backup" style="margin-top:20px; text-align:center;">

        <button class="btn-silver" onclick="dropboxStartLogin()">
          Conectar Dropbox
        </button>

        <button class="btn-gold" onclick="dropboxUploadEncryptedBackup()">
          Subir a Dropbox
        </button>

        <button class="btn-silver" onclick="dropboxDownloadAndRestore()">
          Restaurar desde Dropbox
        </button>

        <button class="btn-outline" onclick="dropboxSignOut()">
          Desconectar Dropbox
        </button>

      </div>

  </div>

</div>

<!-- ==========================
     FORMULARIO DE REGISTRO
=========================== -->
<div id="form" class="form hidden">

  <input type="hidden" id="editId">

  <label>Fecha:</label>
  <input type="date" id="fecha">

  <label>Origen:</label>
  <select id="origen"></select>

  <label>Categoría:</label>
  <select id="categoria"></select>

  <label>Subcategoría:</label>
  <select id="subcategoria"></select>

  <label>Importe (€):</label>
  <input type="number" id="importe" step="0.01">

  <label>Descripción:</label>
  <textarea id="descripcion"></textarea>

  <div class="form-buttons">
    <button class="btn-gold" onclick="guardar()">Guardar</button>
    <button class="btn-outline" onclick="volver()">Volver</button>
    <button id="btnEliminarRegistro" class="btn-danger hidden" onclick="eliminarRegistroActual()">Eliminar</button>
  </div>

</div>

<!-- ==========================
     SCRIPTS
=========================== -->
utils.jsscript>
main.jsscript>

</body>
</html>
