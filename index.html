<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>MIS GASTOS V0.0 BETA</title>

  <!-- PWA -->
  <meta name="theme-color" content="#d4af37" />
  <link rel="manifest" href="./manifest.json" />

  <!-- iOS meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230b0f1a'/><circle cx='50' cy='50' r='40' fill='none' stroke='%23d4af37' stroke-width='4'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='serif' font-weight='bold' font-size='35' fill='%23d4af37'>O%26J</text></svg>">

  <style>
    :root{
      --primary:#d4af37;--success:#22c55e;--danger:#ef4444;--warning:#f97316;--electric-blue:#00f2ff;
      --bg:#0b0f1a;--card-bg:rgba(30,41,59,.7);--text:#f8fafc;
      --gold-gradient:linear-gradient(45deg,#bf953f,#fcf6ba,#b38728,#fbf5b7,#aa771c);
      --pink-metal:linear-gradient(45deg,#a00050,#ff1493,#ff85c1,#ff1493,#a00050);
      --gold-metal:linear-gradient(45deg,#8a6d3b,#d4af37,#fcf6ba,#d4af37,#8a6d3b)
    }
    body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);margin:0;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
    .background-icon{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30vw;font-weight:900;background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;opacity:.1;z-index:-1;pointer-events:none}
    .topbar{background:rgba(30,41,59,.95);backdrop-filter:blur(10px);padding:20px;font-size:15px;font-weight:700;text-align:center;border-bottom:1px solid var(--primary);color:var(--primary);position:sticky;top:0;z-index:1000}
    .container{padding:20px;position:relative;z-index:1}
    .card{background:var(--card-bg);padding:16px;margin:12px 0;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,.3);position:relative;border-left:5px solid var(--primary);backdrop-filter:blur(8px)}
    .card b{font-size:14px;color:#fff;display:block}
    .card .meta{font-size:11px;color:var(--primary);font-weight:700;margin-bottom:4px}
    .card .monto{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:16px;font-weight:800}
    .filtros-wrapper{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;background:var(--card-bg);padding:12px;border-radius:20px;border:1px solid rgba(212,175,55,.3);margin-bottom:20px}
    .filtros-wrapper .filtro-item:nth-child(1),
    .filtros-wrapper .filtro-item:nth-child(2),
    .filtros-wrapper .filtro-item:nth-child(3){grid-column:span 2}
    .filtros-wrapper .filtro-item:nth-child(4),
    .filtros-wrapper .filtro-item:nth-child(5){grid-column:span 3;display:flex;flex-direction:column}
    .footer-controles{position:fixed;bottom:0;left:0;width:100%;background:rgba(15,23,42,.98);backdrop-filter:blur(15px);padding:15px 20px 35px;border-top:2px solid var(--primary);z-index:1100;border-radius:24px 24px 0 0;box-sizing:border-box}
    .footer-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;width:100%}
    .plus{background:var(--gold-gradient);width:65px;height:65px;border-radius:50%;font-size:35px;color:#000;display:flex;align-items:center;justify-content:center;border:none;font-weight:700;cursor:pointer}
    #balance{font-size:24px;font-weight:900;padding:10px 15px;background:#000;border-radius:14px;border:1px solid var(--primary);text-align:center;justify-self:end;min-width:110px}
    input,select,textarea{width:100%;padding:12px;margin:8px 0;font-size:13px;border-radius:12px;border:1px solid #334155;background:rgba(15,23,42,.9);color:#fff;box-sizing:border-box}
    #form input,#form select,#form textarea{font-size:22px!important;height:auto!important;padding:14px!important}
    .btn-small{padding:10px;flex:1;font-size:10px;background:#222;color:var(--primary);border-radius:8px;border:1px solid var(--primary);font-weight:700}
    .hidden{display:none!important}
    .popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(15px)}
    .popup-content{background:#1e293b;padding:25px;border-radius:24px;text-align:center;width:85%;max-width:320px;border:2px solid var(--primary)}
    .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px}
    .btn-pin{background:rgba(255,255,255,.05);border:1px solid var(--primary);color:#fff;padding:15px;border-radius:12px;font-size:20px;font-weight:700}
    .pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
    .dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--primary)}
    .dot.filled{background:var(--primary)}
    .spinner{width:30px;height:30px;border:3px solid rgba(212,175,55,.1);border-left-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:10px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <!-- Overlay de acceso -->
  <div id="authOverlay" class="popup-overlay" role="dialog" aria-modal="true" aria-label="Acceso PIN">
    <div class="popup-content">
      <h2 style="color:var(--primary);margin-bottom:10px">ACCESO GOLD</h2>
      <div class="pin-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <div class="pin-grid">
        <button class="btn-pin" onclick="pressPin(1)" aria-label="1">1</button>
        <button class="btn-pin" onclick="pressPin(2)" aria-label="2">2</button>
        <button class="btn-pin" onclick="pressPin(3)" aria-label="3">3</button>
        <button class="btn-pin" onclick="pressPin(4)" aria-label="4">4</button>
        <button class="btn-pin" onclick="pressPin(5)" aria-label="5">5</button>
        <button class="btn-pin" onclick="pressPin(6)" aria-label="6">6</button>
        <button class="btn-pin" onclick="pressPin(7)" aria-label="7">7</button>
        <button class="btn-pin" onclick="pressPin(8)" aria-label="8">8</button>
        <button class="btn-pin" onclick="pressPin(9)" aria-label="9">9</button>
        <button class="btn-pin" onclick="biometricAuth()" style="color:var(--electric-blue)" aria-label="Biometría">🧬</button>
        <button class="btn-pin" onclick="pressPin(0)" aria-label="0">0</button>
        <button class="btn-pin" onclick="clearPin()" style="color:var(--danger)" aria-label="Borrar">✖</button>
      </div>
    </div>
  </div>

  <div class="background-icon">O&J</div>

  <div id="movimientos" class="hidden">
    <div class="topbar">MIS GASTOS • V0.0 BETA</div>
    
    <div class="container">
      <div class="filtros-wrapper">
        <div class="filtro-item"><span style="font-size:9px;color:var(--primary)">AÑO</span><select id="filtroAño" onchange="resetPagina();mostrar()"></select></div>
        <div class="filtro-item"><span style="font-size:9px;color:var(--primary)">MES</span><select id="filtroMes" onchange="resetPagina();mostrar()"></select></div>
        <div class="filtro-item"><span style="font-size:9px;color:var(--primary)">ORI</span><select id="filtroOri" onchange="resetPagina();mostrar()"></select></div>
        <div class="filtro-item"><span style="font-size:9px;color:var(--primary)">CAT</span><select id="filtroCat" onchange="resetPagina();mostrar()"></select></div>
        <div class="filtro-item"><span style="font-size:9px;color:var(--primary)">SUBCAT</span><select id="filtroSub" onchange="resetPagina();mostrar()"></select></div>
      </div>

      <div id="lista" aria-live="polite"></div>
      <div id="loader" style="display:none"><div class="spinner"></div></div>
      <div style="height:250px"></div>
    </div>

    <div class="footer-controles">
      <div style="display:flex;gap:8px;margin-bottom:20px">
        <button class="btn-small" onclick="exportarCSV()">📊 EXPORTAR</button>
        <button class="btn-small" onclick="document.getElementById('inputFile').click()">📥 IMPORTAR</button>
        <button class="btn-small" onclick="resetTotal()" style="background:#450a0a;color:var(--danger);border-color:var(--danger);flex:.4">⚠️ RESET</button>
        <input type="file" id="inputFile" class="hidden" onchange="importarCSV(event)" />
      </div>

      <div class="footer-row">
        <button class="plus" onclick="abrirGraficos()" aria-label="Ver gráficos" style="width:55px;height:55px;background:var(--gold-metal);font-size:20px">
          <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="black" stroke-width="3">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
          </svg>
        </button>
        <button class="plus" onclick="abrirFormulario()" aria-label="Nuevo registro">+</button>
        <div id="balance">0.00 €</div>
      </div>
    </div>
  </div>

  <div id="form" class="hidden">
    <div class="topbar" id="tituloForm">NUEVO REGISTRO</div>
    <div class="container">
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <select id="origen"></select>
        <input type="date" id="fecha" style="width:45%" onclick="this.showPicker()" />
      </div>

      <input type="hidden" id="editId" />

      <div style="display:flex;gap:8px;align-items:center">
        <select id="categoria" onchange="manejarNuevo(this,'categoria')"></select>
        <button onclick="borrarElemento('categoria')" style="width:70px;height:68px;border-radius:16px;background:var(--danger);border:none;color:#fff;font-size:24px">🗑</button>
      </div>

      <div style="display:flex;gap:8px;align-items:center;margin-top:8px">
        <select id="subcategoria" onchange="manejarNuevo(this,'subcategoria')"></select>
        <button onclick="borrarElemento('subcategoria')" style="width:70px;height:68px;border-radius:16px;background:var(--danger);border:none;color:#fff;font-size:24px">🗑</button>
      </div>

      <input id="importe" type="number" step="0.01" inputmode="decimal" placeholder="0.00 €" style="height:70px!important;font-weight:700" />
      <textarea id="descripcion" maxlength="200" placeholder="Nota..." style="min-height:100px"></textarea>

      <button onclick="guardar()" style="background:var(--gold-gradient);color:#000;height:70px;width:100%;font-size:22px;margin-top:10px;border:none;font-weight:700;border-radius:16px">GUARDAR</button>

      <div id="btnEliminarRegistro" class="hidden">
        <button onclick="eliminarRegistroActual()" style="background:var(--danger);color:#fff;height:60px;width:100%;font-size:18px;margin-top:10px;border:none;font-weight:700;border-radius:16px">ELIMINAR</button>
      </div>

      <button onclick="volver()" style="background:transparent;color:#94a3b8;width:100%;margin-top:15px;border:none;font-size:16px">CANCELAR</button>
    </div>
  </div>

<script>
/* ==========================
  BASES Y ESTADO GLOBAL
========================== */
const subBase = [
  "Accesorios","Agua","Aita","Ajuar / Electrodomésticos","Alojamiento","Apuestas y juegos","Atracciones","Ayuntamiento",
  "Barco","Cajero","Casa","Comida","Comisiones","Comunidad","Copas","Efectivo","Electrónica","Extraescolar","Farmacia",
  "Filamento","Garaje","Gas","Gasolina","Herramientas","Ikastola","Impresora","Impuestos","Juguetes / Regalos",
  "Libros / Material escolar","Luz","Mantenimiento","Medicamentos","Parking","Peaje","Préstamo","Reforma","Ropa",
  "Septiembre","Seguro","Suscripción","Suscripciones","Teléfono","Tren","Varios"
];
const catBase = ["Casa","Caravana","Coche","Compras","Efectivo","Escolar","Garaje","Restaurante","Vacaciones"],
      mesesLabel = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"],
      origenBase = ["Ingreso","Gasto","Nómina"];

// Nómina
const NOMINA_CATS = ["Oskar","Josune"];
const NOMINA_SUBS = [...mesesLabel];

let movimientos   = JSON.parse(localStorage.getItem('movimientos')) || [],
    catExtra      = JSON.parse(localStorage.getItem('categoriaExtra')) || [],
    subMaestra    = JSON.parse(localStorage.getItem('subMaestra_v2')) || subBase.slice(),
    nBackup       = parseInt(localStorage.getItem('nBackup')) || 1,
    registrosVisibles = 25,
    filtradosGlobal = [],
    pinActual = "";

const PIN_OK = "7143";

/* ==========================
  UTILIDADES DE NORMALIZACIÓN (tildes, may/min, plural→singular)
========================== */
// normaliza clave canónica
const normalizeKey = (s) => (s ?? "")
  .toString().trim().toLowerCase()
  .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/[^\p{L}\p{N}]+/gu,' ') // no alfanum → espacio
  .replace(/\s+/g,' ').trim();

// singularización muy simple para español
const singularizeWordEs = (w) => {
  if (w.endsWith('iones')) return w.slice(0,-5)+'ion';
  if (w.endsWith('ces'))   return w.slice(0,-3)+'z';
  if (w.endsWith('es'))    return w.slice(0,-2);
  if (/[aeiou]s$/.test(w)) return w.slice(0,-1);
  return w;
};
const canonicalizeLabel = (s) => {
  const raw = normalizeKey(s);
  return raw
    .split(/([\/\-])/g) // conserva separadores / y -
    .map(tok => (tok==='/'||tok==='-') ? tok :
      tok.split(' ').map(singularizeWordEs).join(' '))
    .join(' ')
    .replace(/\s*\/\s*/g,'/').replace(/\s*-\s*/g,'-').trim();
};
const mostrarBonito = (s) => {
  const t = (s ?? '').toString().trim();
  if (!t) return t;
  return t.charAt(0).toUpperCase() + t.slice(1).toLowerCase();
};
const buildCanonIndex = (preferida=[], secundaria=[]) => {
  const map = new Map();
  const add = (v) => { const k = canonicalizeLabel(v); if (!map.has(k)) map.set(k, v); };
  preferida.forEach(add); secundaria.forEach(add);
  return map;
};

/* ==========================
  SEGURIDAD
========================== */
const pressPin = (n) => {
  if (pinActual.length < 4) {
    pinActual += String(n);
    updateDots();
    if (pinActual === PIN_OK) { unlock(); }
    else if (pinActual.length === 4) { alert("PIN Incorrecto"); clearPin(); }
  }
};
const clearPin  = () => { pinActual = ""; updateDots(); };
const updateDots = () => document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('filled', i < pinActual.length));
const unlock    = () => {
  document.getElementById("authOverlay").style.display = "none";
  const m = document.getElementById("movimientos");
  m.classList.remove("hidden");
  m.dataset.permiso = "OK";
  init();
};
const biometricAuth = async () => {
  if (window.isSecureContext || window.location.protocol === 'file:') unlock();
  else alert("Requiere HTTPS");
};

/* ==========================
  VISTA LISTA / GRÁFICOS
========================== */
const mostrar = () => {
  const movDiv = document.getElementById("movimientos");
  if (!movDiv || movDiv.dataset.permiso !== "OK") return;

  const fs = ["filtroMes","filtroAño","filtroCat","filtroSub","filtroOri"].map(id => document.getElementById(id).value);

  let t = 0;
  filtradosGlobal = movimientos
    .filter(m => {
      const d = m.f.split("-");
      const cM = fs[0] === "TODOS" || (parseInt(d[1]) - 1).toString() === fs[0];
      const cA = fs[1] === "TODOS" || d[0] === fs[1];
      const cC = fs[2] === "TODAS" || m.c === fs[2];
      const cS = fs[3] === "TODAS" || m.s === fs[3];
      const cO = fs[4] === "TODOS" || m.o === fs[4];
      return cM && cA && cC && cS && cO;
    })
    .sort((a,b) => new Date(b.f) - new Date(a.f));

  filtradosGlobal.forEach(m => t += m.imp);

  const factor = (fs[0] === "TODOS") ? 12 : 1;
  const bD = document.getElementById("balance");
  bD.innerText = t.toFixed(2) + " €";
  if (t < 0) bD.style.color = "var(--danger)";
  else if (t <= (750 * factor)) bD.style.color = "var(--warning)";
  else if (t <= (1400 * factor)) bD.style.color = "var(--success)";
  else bD.style.color = "var(--electric-blue)";

  if (movDiv.dataset.modo === "graficos") {
    renderizarBarrasGraficos(factor);
  } else {
    const esc = s => String(s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'}[c]));
    document.getElementById("lista").innerHTML = filtradosGlobal
      .slice(0, registrosVisibles)
      .map(m => `
        <div class='card' onclick="abrirFormulario('${m.id}')" style="border-left-color:${m.imp >= 0 ? 'var(--success)' : 'var(--danger)'}">
          <div class="meta">${m.f.split("-").reverse().join("/")} • ${m.o}</div>
          <b>${m.c} - ${m.s}</b>
          ${m.d ? `<div style="font-size:12px;opacity:.8">${esc(m.d)}</div>` : ''}
          <div class="monto" style="color:${m.imp >= 0 ? 'var(--success)' : 'var(--danger)'}">${m.imp.toFixed(2)} €</div>
        </div>`).join("");
    document.getElementById("loader").style.display = "none";
  }
};

const renderizarBarrasGraficos = (f) => {
  const lista = document.getElementById("lista");
  const totales = filtradosGlobal
    .filter(m => m.imp < 0)
    .reduce((acc,m) => { acc[m.c] = (acc[m.c] || 0) + Math.abs(m.imp); return acc; }, {});
  const max = Math.max(...Object.values(totales), 1);

  let html = `<h2 style="color:var(--primary);font-size:18px;text-align:center">ANÁLISIS DE GASTO</h2>
  <div style="display:flex;justify-content:center;gap:15px;margin-bottom:25px;font-size:19px;font-weight:900">
    <span style="color:var(--electric-blue)">0-${50*f}€</span>
    <span style="color:var(--success)">${200*f}€</span>
    <span style="color:var(--warning)">${500*f}€</span>
    <span style="color:var(--danger)">+</span>
  </div>`;

  lista.innerHTML = html + Object.entries(totales).sort((a,b)=>b[1]-a[1]).map(([cat,val])=>{
    const esCasa = cat.toLowerCase().includes("compra casa");
    const t1 = Math.min(val, 50*f),
          t2 = val > 50*f  ? Math.min(val - 50*f ,150*f) : 0,
          t3 = val > 200*f ? Math.min(val - 200*f,300*f) : 0,
          t4 = val > 500*f ? (val - 500*f) : 0;
    return `<div class="card" style="border:none;background:transparent">
      <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px">
        <span>${cat}</span><b>${val.toFixed(2)} €</b>
      </div>
      <div style="width:${(val/max)*100}%;height:16px;display:flex;background:#000;border-radius:8px;overflow:hidden;border:1px solid rgba(212,175,55,.2)">
        ${esCasa
          ? `<div style="width:100%;background:var(--success)"></div>`
          : `<div style="width:${(t1/val)*100}%;background:var(--electric-blue)"></div>
             <div style="width:${(t2/val)*100}%;background:var(--success)"></div>
             <div style="width:${(t3/val)*100}%;background:var(--warning)"></div>
             <div style="width:${(t4/val)*100}%;background:var(--danger)"></div>`
        }
      </div>
    </div>`;
  }).join("");
};

/* ==========================
  FORMULARIO / CRUD
========================== */
const llenar = (id, base, extra, pre = "", opts = {}) => {
  const s = document.getElementById(id);
  const origenActual = opts.origenActual || "";

  s.innerHTML = `<option value="" disabled ${pre === "" ? 'selected' : ''}>Seleccionar...</option>`;
  let values = [...new Set([...base, ...extra])];

  if (id === "categoria") {
    const ocultarNominaCats = origenActual !== "Nómina";
    if (ocultarNominaCats) values = values.filter(v => !NOMINA_CATS.includes(v));
  }
  if (id === "subcategoria") {
    const ocultarMeses = origenActual !== "Nómina";
    if (ocultarMeses) values = values.filter(v => !NOMINA_SUBS.includes(v));
  }

  values.sort((a,b)=>a.localeCompare(b,'es')).forEach(v=>{
    s.innerHTML += `<option value="${v}" ${v === pre ? 'selected' : ''}>${v}</option>`;
  });

  if (pre && !values.includes(pre)) {
    s.innerHTML += `<option value="${pre}" selected hidden>${pre}</option>`;
  }

  if (id !== "origen") s.innerHTML += `<option value="+">+ Añadir nuevo...</option>`;
};

const abrirFormulario = (id = null) => {
  const f   = document.getElementById("form"),
        mDiv= document.getElementById("movimientos"),
        btnD= document.getElementById("btnEliminarRegistro");

  if (id) {
    let m = movimientos.find(x => x.id.toString() === id.toString());
    document.getElementById("editId").value = m.id;
    document.getElementById("fecha").value  = m.f;

    llenar("origen", origenBase, [], m.o);

    if (NOMINA_CATS.includes(m.c)) {
      llenar("categoria", catBase, catExtra);
      document.getElementById("categoria").innerHTML += `<option value="${m.c}" selected>${m.c}</option>`;
    } else {
      llenar("categoria", catBase, catExtra, m.c, { origenActual: m.o });
    }

    if (m.o === "Nómina") {
      document.getElementById("subcategoria").innerHTML = `<option value="${m.s}" selected>${m.s}</option>`;
    } else {
      llenar("subcategoria", subMaestra, [], m.s, { origenActual: m.o });
    }

    document.getElementById("importe").value     = Math.abs(m.imp);
    document.getElementById("descripcion").value = m.d || "";
    btnD.classList.remove("hidden");

  } else {
    document.getElementById("editId").value      = "";
    document.getElementById("importe").value     = "";
    document.getElementById("descripcion").value = "";
    document.getElementById("fecha").value       = new Date().toISOString().split("T")[0];

    llenar("origen", origenBase, []);

    const oSel = document.getElementById("origen").value || "";
    llenar("categoria",   catBase,   catExtra, "", { origenActual: oSel });
    llenar("subcategoria", subMaestra, [],     "", { origenActual: oSel });

    btnD.classList.add("hidden");
  }

  f.classList.remove("hidden");
  mDiv.classList.add("hidden");
};

const guardar = () => {
  const ids = ["editId","origen","categoria","subcategoria","fecha","descripcion","importe"];
  const v = ids.reduce((acc,id)=>({...acc,[id]:document.getElementById(id).value}),{});
  const imp = parseFloat(v.importe);

  if (!v.origen || !v.categoria || isNaN(imp)) return alert("Faltan datos");

  const m = {
    id : v.editId || `id_${Date.now()}`,
    f  : v.fecha,
    o  : v.origen,
    c  : v.categoria,
    s  : v.subcategoria,
    imp: v.origen === "Gasto" ? -Math.abs(imp) : Math.abs(imp),
    d  : v.descripcion,
    ts : Date.now()
  };

  if (v.editId) {
    const idx = movimientos.findIndex(x => x.id.toString() === v.editId.toString());
    if (idx !== -1) movimientos[idx] = m;
  } else {
    movimientos.push(m);
    if (movimientos.length % 15 === 0) ejecutarBackupRotativo();
  }

  localStorage.setItem('movimientos', JSON.stringify(movimientos));
  volver();
};

    n = n.trim();
    const pretty = mostrarBonito(n);
    const keyNew = canonicalizeLabel(pretty);

    if (tipo === "categoria") {
      const catIdx = buildCanonIndex(catBase, catExtra);
      // Bloqueo nómina manual
      if (NOMINA_CATS.some(x => canonicalizeLabel(x) === keyNew)) {
        alert("No puedes crear manualmente 'Oskar' ni 'Josune'. Selecciona 'Nómina' y usa el popup.");
        el.value = "";

      }
      if (catIdx.has(keyNew)) {
        const existente = catIdx.get(keyNew);
        llenar("categoria", catBase, catExtra, existente, { origenActual: document.getElementById("origen").value || "" });
      } else {

      }
    } else {
      const subIdx = buildCanonIndex(subMaestra, []);
      if (subIdx.has(keyNew)) {
        const existente = subIdx.get(keyNew);
        llenar("subcategoria", subMaestra, [], existente, { origenActual: document.getElementById("origen").value || "" });
      } else {
        subMaestra.push(pretty);
        localStorage.setItem('subMaestra_v2', JSON.stringify(subMaestra));
        llenar("subcategoria", subMaestra, [], pretty, { origenActual: document.getElementById("origen").value || "" });
      }
    }
  }
};

const borrarElemento = (tipo) => {

/* ==========================
  NORMALIZACIÓN RETROACTIVA (listas + movimientos)
========================== */
function normalizarListasExistentes(){
  // Construir índices de preferencia
  const prefCatIdx = buildCanonIndex(catBase, []);
  // Limpiar catExtra: quitar duplicados canónicos y los que ya están en base
  const vistosCat = new Set(Object.values(catBase).map(v => canonicalizeLabel(v)));
  const nuevaExtra = [];
  [...new Set(catExtra)].forEach(v=>{
    const k = canonicalizeLabel(v);
    if (vistosCat.has(k)) return; // ya en base
    if (![...NOMINA_CATS.map(canonicalizeLabel)].includes(k)){
      if (!nuevaExtra.some(x => canonicalizeLabel(x)===k)) nuevaExtra.push(v);
      vistosCat.add(k);
    }
  });
  catExtra = nuevaExtra;
  localStorage.setItem('categoriaExtra', JSON.stringify(catExtra));

  // Subcategorías: eliminar duplicados canónicos
  const vistosSub = new Set();
  const nuevasSubs = [];
  subMaestra.forEach(v=>{
    const k = canonicalizeLabel(v);
    if (!vistosSub.has(k)) { vistas=false; vistas=true; vistosSub.add(k); nuevasSubs.push(v); }
  });
  subMaestra = nuevasSubs;
  localStorage.setItem('subMaestra_v2', JSON.stringify(subMaestra));

  // Normalizar movimientos existentes (c y s a su canónico existente si aplica)
  const catIndexCanon = buildCanonIndex([...catBase, ...catExtra, ...NOMINA_CATS], []);
  const subIndexCanon = buildCanonIndex([...subMaestra, ...NOMINA_SUBS], []);
  let cambiado = false;

  movimientos = movimientos.map(m=>{
    const kc = canonicalizeLabel(m.c);
    const ks = canonicalizeLabel(m.s);
    let c = m.c, s = m.s;
    if (catIndexCanon.has(kc)) c = catIndexCanon.get(kc);
    if (subIndexCanon.has(ks)) s = subIndexCanon.get(ks);
    if (c!==m.c || s!==m.s){
      cambiado = true;
      return {...m, c, s, ts: Math.max(Date.now(), (m.ts||0)+1)};
    }
    return m;
  }).sort((a,b)=>new Date(b.f)-new Date(a.f));

  if (cambiado) localStorage.setItem('movimientos', JSON.stringify(movimientos));
}

<script>
/* ==========================
  CSV: EXPORTACIÓN POR FILAS (CSV europeo)
  - Encabezados en fila 1
  - Delimitador ;  |  Decimales coma
  - Fechas dd/mm/yyyy
  - Nombre: mis_gastos_DDMMYYYY.csv
========================== */
const exportarCSV = () => {
  if (!movimientos || movimientos.length === 0) {
    alert("No hay datos para exportar.");
    return;
  }
  const SEP = ";";

  const toESDate = (iso) => {
    const [y,m,d] = (iso || "").split("-");
    return (y && m && d) ? `${d}/${m}/${y}` : (iso || "");
  };
  const toEuro = (n) => {
    const val = (typeof n === "number" ? n : parseFloat(n || 0));
    const s = Number.isFinite(val) ? val.toString() : "0";
    return s.includes(".") ? s.replace(".", ",") : s;
  };
  const csvCell = (v) => {
    let t = (v ?? "").toString().replace(/\r?\n/g, "⏎");
    if (/[;"\n]/.test(t)) t = '"' + t.replace(/"/g,'""') + '"';
    return t;
  };

  const headers = ["Fecha","Origen","Categoria","Subcategoria","Importe","Descripcion"].join(SEP);

  const rows = movimientos.map(m =>
    [
      toESDate(m.f),
      m.o || "",
      m.c || "",
      m.s || "",
      toEuro(m.imp),
      (m.d ?? "").trim()
    ].map(csvCell).join(SEP)
  );

  const csv = [headers, ...rows].join("\n");

  const hoy = new Date();
  const dd = String(hoy.getDate()).padStart(2,"0");
  const mm = String(hoy.getMonth()+1).padStart(2,"0");
  const yyyy = hoy.getFullYear();
  const fileName = `mis_gastos_${dd}${mm}${yyyy}.csv`;

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = fileName;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
};
</script>

<script>
/* ==========================
  CSV: IMPORTACIÓN con unificación canónica
========================== */
const importarCSV = (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    try {
      const text = reader.result.replace(/^\uFEFF/,"");
      const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
      if (!lines.length) { alert("El archivo está vacío."); return; }

      // Detectar delimitador
      const header = lines[0];
      const counts = {
        tab:(header.match(/\t/g)||[]).length,
        semi:(header.match(/;/g)||[]).length,
        comma:(header.match(/,/g)||[]).length
      };
      let delim = "\t";
      if (counts.tab >= counts.semi && counts.tab >= counts.comma) delim = "\t";
      else if (counts.semi >= counts.comma) delim = ";";
      else delim = ",";

      // Parser CSV/TSV con comillas
      const parseLine = (line) => {
        const out = []; let cur = "", inQ = false;
        for (let i=0;i<line.length;i++){
          const ch = line[i];
          if (ch === '"'){
            if (inQ && line[i+1] === '"'){ cur += '"'; i++; }
            else inQ = !inQ;
          } else if (ch === delim && !inQ) { out.push(cur); cur = ""; }
          else { cur += ch; }
        }
        out.push(cur);
        return out;
      };

      // Índices de columnas
      const cols = parseLine(header).map(h=>h.trim().toLowerCase());
      const idx = {
        fecha: cols.findIndex(c => c.startsWith("fecha")),
        origen: cols.findIndex(c => c.startsWith("origen")),
        categoria: cols.findIndex(c => c.startsWith("categoria")),
        subcategoria: cols.findIndex(c => c.startsWith("subcategoria")),
        importe: cols.findIndex(c => c.startsWith("importe")),
        descripcion: cols.findIndex(c => c.startsWith("descripcion") || c.startsWith("descripción"))
      };
      const required = ["fecha","origen","categoria","subcategoria","importe"];
      const missing = required.filter(k => idx[k] < 0);
      if (missing.length) { alert("Faltan columnas: " + missing.join(", ")); return; }

      // Utils
      const toISODate = (ddmmyyyy) => {
        const m = ddmmyyyy.trim().match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
        if (!m) return ddmmyyyy;
        return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
      };
      const parseEuroNumber = (s) => {
        let t = (s || '').toString().trim();
        t = t.replace(/\.(?=\d{3}(?:\D|$))/g, ''); // miles
        t = t.replace(',', '.');                   // decimal
        const n = parseFloat(t);
        return isNaN(n) ? 0 : n;
      };
      const cleanText = (s) => {
        if (!s) return "";
        let t = s.replace(/\\"{2,}/g, '"').trim();
        if (t.startsWith('"') && t.endsWith('"')) t = t.slice(1,-1);
        return t.trim();
      };

      // Índices canónicos actuales (para mapear a existentes)
      const catIndexCanon = buildCanonIndex([...catBase, ...catExtra, ...NOMINA_CATS], []);
      const subIndexCanon = buildCanonIndex([...subMaestra, ...NOMINA_SUBS], []);

      const nuevos = [];
      for (let i = 1; i < lines.length; i++) {
        const arr = parseLine(lines[i]);
        if (arr.every(v => (v || '').trim() === '')) continue;

        const rawFecha = arr[idx.fecha] ?? '';
        const rawOrigen = arr[idx.origen] ?? '';
        const rawCat = arr[idx.categoria] ?? '';
        const rawSub = arr[idx.subcategoria] ?? '';
        const rawImp = arr[idx.importe] ?? '';
        const rawDesc = (idx.descripcion >= 0 ? arr[idx.descripcion] : '') ?? '';

        const f = toISODate(cleanText(rawFecha));
        let o = cleanText(rawOrigen);
        let c = mostrarBonito(cleanText(rawCat));
        let s = mostrarBonito(cleanText(rawSub));
        let d = cleanText(rawDesc);

        // Origen y signo
        const oLow = o.toLowerCase();
        if (oLow.startsWith('nom')) o = 'Nómina';
        else if (oLow.startsWith('gas')) o = 'Gasto';
        else if (oLow.startsWith('ing')) o = 'Ingreso';

        // Unificación canónica
        const keyC = canonicalizeLabel(c);
        const keyS = canonicalizeLabel(s);
        if (catIndexCanon.has(keyC)) c = catIndexCanon.get(keyC);
        if (subIndexCanon.has(keyS)) s = subIndexCanon.get(keyS);

        let imp = parseEuroNumber(rawImp);
        if (o === 'Gasto' && imp > 0) imp = -Math.abs(imp);
        if (o !== 'Gasto' && imp < 0) imp = Math.abs(imp);

        const mov = { id:`id_${Date.now()}_${i}`, f, o, c, s, imp, d, ts: Date.now() + i };
        if (!f || !o || !c || !s || isNaN(imp)) continue;

        nuevos.push(mov);
      }

      // Insertar categorías/subcategorías nuevas (no duplicadas canónicas)
      const addIfNewCanon = (list, storeKey, value) => {
        const k = canonicalizeLabel(value);
        const exists = list.some(v => canonicalizeLabel(v) === k);
        if (!exists) {
          list.push(value);
          localStorage.setItem(storeKey, JSON.stringify(list));
        }
      };
      nuevos.forEach(m=>{
        // cat
        if (![...catBase, ...catExtra, ...NOMINA_CATS].some(v => canonicalizeLabel(v) === canonicalizeLabel(m.c))){
          addIfNewCanon(catExtra, 'categoriaExtra', m.c);
        }
        // sub
        if (![...subMaestra, ...NOMINA_SUBS].some(v => canonicalizeLabel(v) === canonicalizeLabel(m.s))){
          addIfNewCanon(subMaestra, 'subMaestra_v2', m.s);
        }
      });

      // Guardar movimientos (ordenados)
      movimientos = [...movimientos, ...nuevos].sort((a,b)=>new Date(b.f)-new Date(a.f));
      localStorage.setItem('movimientos', JSON.stringify(movimientos));

      // Refrescar UI
      actualizarListas();
      resetPagina();
      mostrar();
      alert(`Importación completa: ${nuevos.length} registros añadidos.`);
    } catch (err) {
      console.error(err);
      alert("Error al importar el CSV. Revisa el formato.");
    } finally {
      e.target.value = "";
    }
  };
  reader.onerror = () => alert("No se pudo leer el archivo.");
  reader.readAsText(file, 'UTF-8');
};
</script>

  ELIMINAR REGISTRO
========================== */
window.eliminarRegistroActual = function(){
  const idAEliminar = document.getElementById("editId").value;
  if (!idAEliminar) return;
  if (confirm("¿ESTÁS SEGURO DE QUE DESEAS ELIMINAR ESTE REGISTRO?")) {
    movimientos = movimientos.filter(m => m.id.toString() !== idAEliminar.toString());
    localStorage.setItem('movimientos', JSON.stringify(movimientos));
    volver();
  }
};

/* ==========================
  FILTROS GRANDES (UI)
========================== */
const estiloFiltrosGrandes = document.createElement('style');
estiloFiltrosGrandes.innerHTML = `
.filtro-item span{font-size:13px!important;font-weight:900!important;letter-spacing:1px!important;margin-bottom:5px!important;display:inline-block!important}
.filtro-item select{font-size:16px!important;height:50px!important;padding:5px 10px!important;border-radius:14px!important;font-weight:bold!important}
.filtros-wrapper{padding:15px 10px!important;gap:10px!important}`;
document.head.appendChild(estiloFiltrosGrandes);

/* ==========================
  REGISTRO SERVICE WORKER (PWA)
========================== */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.error("SW ERROR:", err));
  });
}
</script>
