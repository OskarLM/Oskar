<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mi App</title>
  <meta name="theme-color" content="#0d6efd">
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="app-header">
    <h1>Mi Aplicación Segura</h1>
  </header>

  <main class="app-main">
    <!-- Acceso por PIN -->
    <section id="login-section" class="card">
      <h2>Acceso</h2>
      <div id="pin-setup" hidden>
        <p>Primera vez: crea tu <strong>PIN</strong>.</p>
        <form id="pin-set-form" autocomplete="off">
          <label for="pin-new">Nuevo PIN</label>
          <input id="pin-new" type="password" inputmode="numeric" maxlength="6" required data-normalize="digits" />
          <label for="pin-new2">Repite PIN</label>
          <input id="pin-new2" type="password" inputmode="numeric" maxlength="6" required data-normalize="digits" />
          <button type="submit">Guardar PIN</button>
        </form>
        <p id="pin-setup-msg" class="muted"></p>
      </div>

      <div id="pin-login" hidden>
        <form id="pin-form" autocomplete="off">
          <label for="pin-input">Introduce tu PIN</label>
          <input id="pin-input" type="password" inputmode="numeric" maxlength="6" required data-normalize="digits" />
          <button type="submit">Entrar</button>
        </form>
        <p id="pin-message" class="muted"></p>
      </div>
    </section>

    <section id="app-content" class="card" hidden>
      <h2>Contenido protegido</h2>

      <div class="filters">
        <input id="filter-text" type="search" placeholder="Buscar por prefijo…" autocomplete="off">
        <input id="filter-from" type="date" aria-label="Desde">
        <input id="filter-to" type="date" aria-label="Hasta">
        <button id="btn-reset" type="button">Reiniciar</button>
      </div>

      <form id="data-form" class="row">
        <input id="data-input" type="text" placeholder="Nuevo dato…" required data-normalize="trim collapse" autocomplete="off" />
        <button type="submit">Guardar</button>
      </form>

      <p><small>Total filtrado: <span id="total-count">0</span></small></p>
      <ul id="data-list" class="list"></ul>

      <div class="pagination">
        <button id="btn-more" type="button">Cargar más</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <small>© 2026 Mi App</small>
  </footer>

  <!-- Scripts -->
  <script type="module" src="../src/normalizer.js"></script>
  <script type="module" src="../src/pin.js"></script>
  <script type="module" src="../src/app.js"></script>
</body>
</html>
